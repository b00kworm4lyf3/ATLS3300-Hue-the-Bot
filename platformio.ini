[env:adafruit_itsybitsy_esp32]
platform = espressif32
board = adafruit_itsybitsy_esp32
framework = arduino
lib_deps = 
	adafruit/Adafruit NeoPixel@^1.15.4
	adafruit/Adafruit AS7343@^1.1.0
	adafruit/Adafruit MPU6050@^2.2.9
	adafruit/Adafruit GFX Library@^1.12.5
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit SPIFlash@^5.1.1
	adafruit/SdFat - Adafruit Fork@^2.3.103
